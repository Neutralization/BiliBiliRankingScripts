<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <title>Bilibili Ranking Render Debug</title>
  <style>
    @font-face {
      font-family: YuanTi;
      src: url("../footage/华文圆体 Bold_粗体.ttf");
    }

    @font-face {
      font-family: HanNote;
      src: url("../footage/手札体-简_标准体.ttf");
    }

    @font-face {
      font-family: HYHeiMi;
      src: url("../footage/汉仪黑咪体简_Regular.ttf");
    }

    @font-face {
      font-family: FZCuYuan;
      src: url("../footage/方正粗圆_GBK_Regular.ttf");
    }

    @font-face {
      font-family: Emoji;
      src: url("../footage/Segoe UI Emoji_Normal.ttf");
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
    }

    body {
      overflow: hidden;
      font-family: YuanTi, Emoji, "Segoe UI", "Segoe UI Emoji", sans-serif;
    }

    body.debug {
      min-width: 1920px;
      overflow: auto;
      background:
        linear-gradient(90deg, rgba(32, 32, 32, 0.08) 1px, transparent 1px),
        linear-gradient(rgba(32, 32, 32, 0.08) 1px, transparent 1px),
        #2d3138;
      background-size: 40px 40px;
    }

    #debug-panel {
      display: none;
    }

    body.debug #debug-panel {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: center;
      padding: 10px 14px;
      color: #f4efe6;
      background: rgba(18, 22, 28, 0.94);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      font: 14px/1.4 "Segoe UI", sans-serif;
    }

    #debug-panel label {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      white-space: nowrap;
    }

    #debug-panel select,
    #debug-panel input {
      accent-color: #d9975b;
    }

    #debug-info {
      flex-basis: 100%;
      color: #c9d0d8;
      font-size: 12px;
    }

    body.debug #canvas {
      margin: 18px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.45);
    }

    #canvas {
      position: relative;
      overflow: hidden;
      background-repeat: no-repeat;
      background-size: 100% 100%;
      color: #6D4B2B;
    }

    #canvas.rank-main {
      background-image: url("../footage/MAINRANKIMG.png");
    }

    #canvas.rank-bangumi {
      background-image: url("../footage/BANGUMIRANKIMG.png");
    }

    #canvas.rank-history {
      background-image: url("../footage/HISTORYRANKIMG.png");
    }

    #canvas.rank-pickup {
      background-image: url("../footage/PICKUPIMG.png");
    }

    #canvas.sub-main {
      background-image: url("../footage/SUBRANKIMG.png");
    }

    #canvas.sub-bangumi {
      background-image: url("../footage/SUBBANGUMIRANKIMG.png");
    }

    #canvas.stat-1 {
      background-image: url("../footage/STATONEIMG.png");
    }

    #canvas.stat-2 {
      background-image: url("../footage/STATTWOIMG.png");
    }

    #canvas.stat-3 {
      background-image: url("../footage/STATTHREEIMG.png");
    }

    #canvas.simple-opening {
      background-image: url("../footage/MAINTITLEIMG.png");
    }

    #canvas.simple-long-term {
      background-image: url("../footage/LONGIMG.png");
    }

    #canvas.simple-history-record {
      background-image: url("../footage/HISTORYRECORDIMG.png");
    }

    #canvas.simple-top-diff {
      background-image: url("../footage/TOPIMG.png");
    }

    #canvas.debug-grid::before {
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      content: "";
      background:
        linear-gradient(90deg, rgba(255, 0, 0, 0.32) 1px, transparent 1px),
        linear-gradient(rgba(255, 0, 0, 0.32) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.2) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, 0.2) 1px, transparent 1px);
      background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
    }

    #canvas.debug-boxes .field,
    #canvas.debug-boxes .img {
      outline: 1px solid rgba(0, 255, 255, 0.85);
      background-color: rgba(0, 255, 255, 0.08);
    }

    .debug-overlay {
      position: absolute;
      inset: 0;
      z-index: 8;
      width: 100%;
      height: 100%;
      pointer-events: none;
      object-fit: fill;
    }

    .field,
    .img {
      position: absolute;
    }

    .field {
      white-space: nowrap;
      line-height: 1;
    }

    .center {
      transform: translateX(-50%);
      text-align: center;
    }

    .right {
      width: max-content;
      text-align: right;
      transform: translateX(-100%);
    }

    .shadow-white {
      color: #FFFFFF;
      text-shadow: 2px 2px 0 #000000, 1px 1px 0 #818181;
    }

    .cover {
      object-fit: cover;
    }

    .sub-cover {
      object-fit: contain;
    }

    .contain {
      object-fit: contain;
    }

    .asset {
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
    }

    .trend-up {
      background-image: url("../footage/UPIMG.png");
    }

    .trend-down {
      background-image: url("../footage/DOWNIMG.png");
    }

    .trend-draw {
      background-image: url("../footage/DRAWIMG.png");
    }

    .longtime-mark {
      left: 11px;
      top: 11px;
      width: 180px;
      height: 180px;
      background-image: url("../footage/LONGTIMEIMG.png");
    }

    .title {
      overflow: hidden;
      text-overflow: clip;
      font-family: YuanTi, Emoji, "Segoe UI Emoji", sans-serif;
    }

    .font-note {
      font-family: HanNote, Emoji, "Segoe UI Emoji", sans-serif;
    }

    .font-rank {
      font-family: HYHeiMi, Emoji, "Segoe UI Emoji", sans-serif;
    }

    .font-round {
      font-family: YuanTi, Emoji, "Segoe UI Emoji", sans-serif;
    }

    .font-fz {
      font-family: FZCuYuan, Emoji, "Segoe UI Emoji", sans-serif;
    }

    .rank-title {

    .rank-author {

    .rank-bangumi .rank-author {
      left: 189px;
    }

    .rank-cover {

    }

    .rank-bv {

    .rank-category {

    .rank-cdate {
      left: 933px;

    }

    .rank-bangumi .rank-cdate {
      left: 754px;
    }

    .rank-score-rank {
      left: 1703px;

    }

    .rank-score {
      left: 1703px;

    }

    .rank-week {

    .rank-click,

  </style>

<body>
  <div id="debug-panel">
    <label>场景
      <select id="debug-scene"></select>
    </label>
    <label>
      <input id="debug-overlay-enabled" type="checkbox" checked>
      叠加参考图
    </label>
    <label>参考透明度
      <input id="debug-overlay-opacity" type="range" min="0" max="1" step="0.05" value="0.5">
    </label>
    <label>渲染透明度
      <input id="debug-canvas-opacity" type="range" min="0.1" max="1" step="0.05" value="1">
    </label>
    <label>
      <input id="debug-grid" type="checkbox">
      网格
    </label>
    <label>
      <input id="debug-boxes" type="checkbox">
      元素边框
    </label>
    <span id="debug-info"></span>
  </div>
  <div id="canvas"></div>
  <script>
    const canvas = document.getElementById("canvas");
    const PAGE_WIDTH = 1920;
    const PAGE_HEIGHT = 1080;

    function rel(path) {
      return new URL(path, window.location.href).href;
    }

    function reset(data) {
      canvas.innerHTML = "";
      canvas.classList.remove(
        "rank-main",
        "rank-bangumi",
        "rank-history",
        "rank-pickup",
        "sub-main",
        "sub-bangumi",
        "stat-1",
        "stat-2",
        "stat-3",
        "simple-opening",
        "simple-long-term",
        "simple-history-record",
        "simple-top-diff"
      );
      canvas.style.width = `${data.width}px`;
      canvas.style.height = `${data.height}px`;
      canvas.style.backgroundImage = "";
    }

    function field(text, x, y, options = {}) {
      const el = document.createElement("div");
      el.className = `field ${options.className || ""}`;
      el.textContent = text ?? "";
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      if (options.width && !el.classList.contains("right")) el.style.width = `${options.width}px`;
      if (options.size) el.style.fontSize = `${options.size}px`;
      if (options.color) el.style.color = options.color;
      if (options.weight) el.style.fontWeight = options.weight;
      if (options.align) el.style.textAlign = options.align;
      if (options.lineHeight) el.style.lineHeight = options.lineHeight;
      canvas.appendChild(el);
      return el;
    }

    function text(className, value) {
      const el = document.createElement("div");
      el.className = `field ${className}`;
      el.textContent = value ?? "";
      canvas.appendChild(el);
      return el;
    }

    function image(src, x, y, width, height, options = {}) {
      if (!src) return null;
      const img = document.createElement("img");
      img.className = `img ${options.className || ""}`;
      img.src = src;
      img.style.left = `${x}px`;
      img.style.top = `${y}px`;
      img.style.width = `${width}px`;
      img.style.height = `${height}px`;
      canvas.appendChild(img);
      return img;
    }

    function classImage(src, className) {
      if (!src) return null;
      const img = document.createElement("img");
      img.className = `img ${className}`;
      img.src = src;
      canvas.appendChild(img);
      return img;
    }

    function asset(className) {
      const el = document.createElement("div");
      el.className = `img asset ${className}`;
      canvas.appendChild(el);
      return el;
    }

    function positionedAsset(className, x, y, width, height) {
      const el = asset(className);
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      el.style.width = `${width}px`;
      el.style.height = `${height}px`;
      return el;
    }

    function rankCard(data) {
      reset(data);
      const d = data.card;
      canvas.classList.add(`rank-${d.variant || (d.history ? "history" : "main")}`);
      if (d.longtime) asset("longtime-mark");
      classImage(d.cover, "rank-cover cover");

      text("rank-title title", d.title);
      text("rank-author font-note", d.author);
      text("rank-bv font-round center", d.bv);
      if (d.category) text("rank-category font-round center", d.category);
      text("rank-cdate font-round center", d.cdate);
      if (d.variant === "pickup") {
        if (d.invalid) text("rank-invalid font-fz", d.invalid);
        return;
      }
      text("rank-score-rank font-rank center", d.scoreRank);

      if (d.history) {
        text("rank-score font-round center", d.score);
        text("rank-week font-round", `#${d.week}`);
      } else {
        text("rank-score font-round center", d.score);
        if (d.lastRank === "0") {
          text("rank-last-label font-note center shadow-white", "新上榜");
        } else if (d.lastRank) {
          text("rank-last-label font-note center shadow-white", "上周");
          text("rank-last-rank font-note shadow-white", d.lastRank);
          asset(`rank-pin trend-${d.pin || "draw"}`);
        }

        text("rank-click font-round", d.click);
        text("rank-comment font-round", d.comment);
        text("rank-third font-round", d.thirdValue);
        text("rank-fourth font-round", d.fourthValue);
        if (d.partText) text("rank-part font-note center", d.partText);
        text("rank-fix-a font-round", d.fixA);
        text("rank-fix-b font-round", d.fixB);
        text("rank-fix-c font-round", d.fixC);
        if (d.fixB2) text("rank-fix-b2 font-round", d.fixB2);
        if (d.fixD) text("rank-fix-d font-round", d.fixD);
        text("rank-click-rank font-note", d.clickRank);
        text("rank-comment-rank font-note", d.commentRank);
        text("rank-third-rank font-note", d.thirdRank);
        text("rank-fourth-rank font-note", d.fourthRank);
      }
      if (d.invalid) text("rank-invalid font-fz", d.invalid);
    }

    function subRank(data) {
      reset(data);
      canvas.classList.add(`sub-${data.kind || "main"}`);
      data.rows.forEach((row, j) => {
        const y = j * 259;
        image(row.cover, 63, 48 + y, 336, 210, { className: "sub-cover" });
        field(row.title, 424, 57 + y, { width: 1461, size: 52, color: "#6D4B2B", className: "title", lineHeight: "54px" });
        field(row.bv, 549, 221 + y, { size: 32, color: "#FFFFFF", className: "font-round center" });
        field(row.score, 1706, 225 + y, { width: 1, size: 45, color: "#FFFFFF", className: "font-round right" });
        field(row.click, 491, 143 + y, { size: 40, color: "#6D4B2B", className: "font-round" });
        field(row.comment, 893, 143 + y, { size: 40, color: "#6D4B2B", className: "font-round" });
        field(row.thirdValue, 1218, 143 + y, { size: 40, color: "#6D4B2B", className: "font-round" });
        if (row.fourthValue) field(row.fourthValue, 1574, 143 + y, { size: 40, color: "#6D4B2B", className: "font-round" });
        if (row.clickRank) field(row.clickRank, 739, 148 + y, { size: 32, color: "#BCA798", className: "font-round" });
        if (row.commentRank) field(row.commentRank, 1067, 148 + y, { size: 32, color: "#BCA798", className: "font-round" });
        if (row.thirdRank) field(row.thirdRank, 1390, 148 + y, { size: 32, color: "#BCA798", className: "font-round" });
        if (row.fourthRank) field(row.fourthRank, 1748, 148 + y, { size: 32, color: "#BCA798", className: "font-round" });
        field(row.scoreRank, 1856, 214 + y, { size: 48, color: "#FFFFFF", className: "font-rank center" });
        field(row.cdate, 820, 215 + y, { size: 37, color: "#BCA798", className: "font-round" });
        field(row.lastRank, 1244, 215 + y, { size: 34, color: "#BCA798", className: "font-round" });
      });
    }

    function stat(data) {
      reset(data);
      canvas.classList.add(`stat-${data.kind}`);
      if (data.kind === 1 || data.kind === 2) {
        data.rows.forEach((row, i) => {
          const y = 225 + i * 120;
          field(row.category, 616, y, { size: 43, color: "#6D4B2B", className: "font-fz center" });
          field(row.score, 1046, y + 5, { width: 1, size: 35, color: "#6D4B2B", className: "font-round right" });
          field(row.rank, 1440, y + 5, { size: 35, color: "#AC8164", className: "font-round" });
          if (row.trend) positionedAsset(`trend-${row.trend}`, 1500, 222 + i * 120, 45, 45);
        });
      } else {
        data.rows.forEach((row, i) => {
          const y = 314 + i * 134;
          field(row.current, 869, y, { width: 1, size: 38, color: "#6D4B2B", className: "font-round right" });
          field(row.last, 1279, y + 6, { size: 31, color: "#AC8164", className: "font-round" });
          if (row.trend) positionedAsset(`trend-${row.trend}`, 1503, 309 + i * 134, 45, 45);
        });
      }
    }

    function simple(data) {
      reset(data);
      canvas.classList.add(`simple-${data.kind}`);
      if (data.kind === "opening") {
        text("simple-field opening-week font-rank center", data.week);
        text("simple-field opening-title font-rank center", data.title);
      }
      if (data.kind === "long-term") {
        text("simple-field long-term-range font-rank center", data.range);
        text("simple-field long-term-description font-note center", data.description);
      }
      if (data.kind === "history-record") {
        text("simple-field history-record-title font-note center", data.title);
        text("simple-field history-record-count font-note center", data.count);
      }
      if (data.kind === "top-diff") {
        text("simple-field top-diff-place font-rank center", data.place);
        text("simple-field top-diff-text font-note center", data.diffText);
      }
    }

    function preloadImage(path) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = resolve;
        img.onerror = reject;
        img.src = rel(path);
      });
    }

    function staticImagePaths(data) {
      const paths = [];
      if (data.template === "rank-card") {
        const variant = data.card.variant || (data.card.history ? "history" : "main");
        paths.push({
          main: "../footage/MAINRANKIMG.png",
          bangumi: "../footage/BANGUMIRANKIMG.png",
          history: "../footage/HISTORYRANKIMG.png",
          pickup: "../footage/PICKUPIMG.png"
        }[variant]);
        if (data.card.longtime) paths.push("../footage/LONGTIMEIMG.png");
        if (data.card.pin) paths.push(`../footage/${data.card.pin.toUpperCase()}IMG.png`);
      }
      if (data.template === "sub-rank") {
        paths.push(data.kind === "bangumi" ? "../footage/SUBBANGUMIRANKIMG.png" : "../footage/SUBRANKIMG.png");
      }
      if (data.template === "stat") {
        paths.push({
          1: "../footage/STATONEIMG.png",
          2: "../footage/STATTWOIMG.png",
          3: "../footage/STATTHREEIMG.png"
        }[data.kind]);
        data.rows.forEach((row) => {
          if (row.trend) paths.push(`../footage/${row.trend.toUpperCase()}IMG.png`);
        });
      }
      if (data.template === "simple") {
        paths.push({
          opening: "../footage/MAINTITLEIMG.png",
          "long-term": "../footage/LONGIMG.png",
          "history-record": "../footage/HISTORYRECORDIMG.png",
          "top-diff": "../footage/TOPIMG.png"
        }[data.kind]);
      }
      return [...new Set(paths.filter(Boolean))];
    }

    window.renderTemplate = async function renderTemplate(data) {
      if (data.template === "rank-card") rankCard(data);
      if (data.template === "sub-rank") subRank(data);
      if (data.template === "stat") stat(data);
      if (data.template === "simple") simple(data);
      await document.fonts.ready;
      await Promise.all(staticImagePaths(data).map(preloadImage));
      await Promise.all(Array.from(canvas.querySelectorAll("img")).map((img) => {
        if (img.complete) return Promise.resolve();
